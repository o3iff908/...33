<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Solutions - Renewable Energy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Blue decorative corner top-right -->
    <div class="corner-top-right"></div>
    
    <!-- Main container with rounded corners -->
    <div class="main-container">
        <!-- Navigation bar -->
        <nav class="navbar">
            <!-- Logo -->
            <div class="logo">
                <svg width="50" height="50" viewBox="0 0 50 50">
                    <!-- Circles for SPC logo -->
                    <circle cx="15" cy="25" r="8" fill="#1E5B8C" opacity="0.8"/>
                    <circle cx="25" cy="25" r="8" fill="#2ECC71" opacity="0.8"/>
                    <circle cx="35" cy="25" r="8" fill="#F39C12" opacity="0.8"/>
                </svg>
                <div class="logo-text">
                    <span class="logo-spc">SPC</span>
                    <span class="logo-solutions">SOLUTIONS</span>
                </div>
            </div>
            
            <!-- Navigation menu -->
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link active">Home</a></li>
                <li class="nav-item dropdown">
                    <a href="#" class="nav-link">Services <span class="dropdown-icon">▼</span></a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Service 1</a></li>
                        <li><a href="#">Service 2</a></li>
                        <li><a href="#">Service 3</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a href="#" class="nav-link">About Us <span class="dropdown-icon">▼</span></a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Our Story</a></li>
                        <li><a href="#">Team</a></li>
                        <li><a href="#">Mission</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a href="#" class="nav-link">Contact Us</a></li>
            </ul>
            
            <!-- Contact Us button -->
            <button class="contact-btn">Contact Us</button>
        </nav>
        
        <!-- Hero section -->
        <div class="hero-section">
            <h1 class="hero-title">Renewable Energy</h1>
        </div>
    </div>
    
    <!-- Blue decorative corner bottom-left -->
    <div class="corner-bottom-left"></div>
    
    <script src="script.js"></script>
</body>
</html>
